<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Typical Bioinformatics Workflow">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
    <filter id="stepShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="flowArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#78909C"/>
    </marker>
  </defs>
  
  <rect width="800" height="400" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#333">A Typical Bioinformatics Analysis Workflow</text>
  
  <!-- Step 1 -->
  <g filter="url(#stepShadow)">
    <rect x="30" y="70" width="110" height="80" rx="10" fill="url(#stepGrad)"/>
    <text x="85" y="100" text-anchor="middle" font-family="Verdana, sans-serif" font-size="32" fill="#fff">1</text>
    <text x="85" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#c5cae9">Question</text>
  </g>
  <text x="85" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">Define</text>
  <text x="85" y="182" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">biological</text>
  <text x="85" y="194" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">question</text>
  
  <!-- Arrow 1-2 -->
  <path d="M145 110 L165 110" stroke="#78909C" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  
  <!-- Step 2 -->
  <g filter="url(#stepShadow)">
    <rect x="170" y="70" width="110" height="80" rx="10" fill="url(#stepGrad)"/>
    <text x="225" y="100" text-anchor="middle" font-family="Verdana, sans-serif" font-size="32" fill="#fff">2</text>
    <text x="225" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#c5cae9">Data</text>
  </g>
  <text x="225" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">Acquire raw</text>
  <text x="225" y="182" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">data &amp;</text>
  <text x="225" y="194" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">metadata</text>
  
  <!-- Arrow 2-3 -->
  <path d="M285 110 L305 110" stroke="#78909C" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  
  <!-- Step 3 -->
  <g filter="url(#stepShadow)">
    <rect x="310" y="70" width="110" height="80" rx="10" fill="url(#stepGrad)"/>
    <text x="365" y="100" text-anchor="middle" font-family="Verdana, sans-serif" font-size="32" fill="#fff">3</text>
    <text x="365" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#c5cae9">QC</text>
  </g>
  <text x="365" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">Quality</text>
  <text x="365" y="182" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">control &amp;</text>
  <text x="365" y="194" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">preprocessing</text>
  
  <!-- Arrow 3-4 -->
  <path d="M425 110 L445 110" stroke="#78909C" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  
  <!-- Step 4 -->
  <g filter="url(#stepShadow)">
    <rect x="450" y="70" width="110" height="80" rx="10" fill="url(#stepGrad)"/>
    <text x="505" y="100" text-anchor="middle" font-family="Verdana, sans-serif" font-size="32" fill="#fff">4</text>
    <text x="505" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#c5cae9">Analysis</text>
  </g>
  <text x="505" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">Statistical /</text>
  <text x="505" y="182" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">ML</text>
  <text x="505" y="194" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">analysis</text>
  
  <!-- Arrow 4-5 -->
  <path d="M565 110 L585 110" stroke="#78909C" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  
  <!-- Step 5 -->
  <g filter="url(#stepShadow)">
    <rect x="590" y="70" width="110" height="80" rx="10" fill="url(#stepGrad)"/>
    <text x="645" y="100" text-anchor="middle" font-family="Verdana, sans-serif" font-size="32" fill="#fff">5</text>
    <text x="645" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#c5cae9">Interpret</text>
  </g>
  <text x="645" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">Biological</text>
  <text x="645" y="182" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">interpretation</text>
  
  <!-- Arrow 5-6 -->
  <path d="M645 155 L645 215" stroke="#78909C" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  
  <!-- Step 6 -->
  <g filter="url(#stepShadow)">
    <rect x="590" y="220" width="110" height="80" rx="10" fill="#43A047"/>
    <text x="645" y="250" text-anchor="middle" font-family="Verdana, sans-serif" font-size="32" fill="#fff">6</text>
    <text x="645" y="280" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#c8e6c9">Report</text>
  </g>
  <text x="645" y="320" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">Validate &amp;</text>
  <text x="645" y="332" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">report</text>
  <text x="645" y="344" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#555">reproducibly</text>
  
  <!-- Iteration arrows -->
  <path d="M590 260 Q 520 310 450 260" stroke="#EF5350" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#flowArrow)"/>
  <text x="520" y="340" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#EF5350">Iterate as needed</text>
  
  <!-- Key tools box -->
  <rect x="30" y="230" width="380" height="140" rx="8" fill="#ECEFF1"/>
  <text x="50" y="255" font-family="Verdana, sans-serif" font-size="12" font-weight="bold" fill="#37474F">Common Tools at Each Stage:</text>
  <text x="50" y="280" font-family="Verdana, sans-serif" font-size="10" fill="#546E7A">• Data: SRA, GEO, local sequencing core</text>
  <text x="50" y="298" font-family="Verdana, sans-serif" font-size="10" fill="#546E7A">• QC: FastQC, MultiQC, samtools</text>
  <text x="50" y="316" font-family="Verdana, sans-serif" font-size="10" fill="#546E7A">• Analysis: BWA, STAR, DESeq2, GATK</text>
  <text x="50" y="334" font-family="Verdana, sans-serif" font-size="10" fill="#546E7A">• Interpret: GO enrichment, pathway tools</text>
  <text x="50" y="352" font-family="Verdana, sans-serif" font-size="10" fill="#546E7A">• Report: R Markdown, Jupyter, Git</text>
</svg>
