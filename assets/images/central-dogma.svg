<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Central Dogma of Molecular Biology">
  <defs>
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="rnaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#BA68C8"/>
    </linearGradient>
    <linearGradient id="proteinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="320" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#333">The Central Dogma of Molecular Biology</text>
  
  <!-- DNA Box -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="160" height="100" rx="12" fill="url(#dnaGrad)"/>
    <text x="140" y="145" text-anchor="middle" font-family="Verdana, sans-serif" font-size="20" font-weight="bold" fill="#fff">DNA</text>
    <text x="140" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#e3f2fd">Storage</text>
    <text x="140" y="186" text-anchor="middle" font-family="monospace" font-size="10" fill="#bbdefb">A-T-C-G</text>
  </g>
  
  <!-- Arrow 1: Transcription -->
  <g>
    <path d="M230 150 L310 150" stroke="#555" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
      </marker>
    </defs>
    <text x="270" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" fill="#666">Transcription</text>
  </g>
  
  <!-- RNA Box -->
  <g filter="url(#shadow)">
    <rect x="320" y="100" width="160" height="100" rx="12" fill="url(#rnaGrad)"/>
    <text x="400" y="145" text-anchor="middle" font-family="Verdana, sans-serif" font-size="20" font-weight="bold" fill="#fff">RNA</text>
    <text x="400" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#f3e5f5">Messenger</text>
    <text x="400" y="186" text-anchor="middle" font-family="monospace" font-size="10" fill="#e1bee7">A-U-C-G</text>
  </g>
  
  <!-- Arrow 2: Translation -->
  <g>
    <path d="M490 150 L570 150" stroke="#555" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="530" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" fill="#666">Translation</text>
  </g>
  
  <!-- Protein Box -->
  <g filter="url(#shadow)">
    <rect x="580" y="100" width="160" height="100" rx="12" fill="url(#proteinGrad)"/>
    <text x="660" y="145" text-anchor="middle" font-family="Verdana, sans-serif" font-size="20" font-weight="bold" fill="#fff">Protein</text>
    <text x="660" y="170" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#e8f5e9">Function</text>
    <text x="660" y="186" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8e6c9">Met-Ala-Lys...</text>
  </g>
  
  <!-- Annotations -->
  <g font-family="Verdana, sans-serif" font-size="11" fill="#777">
    <text x="140" y="235" text-anchor="middle">Double helix</text>
    <text x="140" y="250" text-anchor="middle">in nucleus</text>
    <text x="400" y="235" text-anchor="middle">Single strand</text>
    <text x="400" y="250" text-anchor="middle">leaves nucleus</text>
    <text x="660" y="235" text-anchor="middle">Amino acid chain</text>
    <text x="660" y="250" text-anchor="middle">folds into 3D shape</text>
  </g>
  
  <!-- Key insight -->
  <rect x="200" y="270" width="400" height="36" rx="8" fill="#fff3e0"/>
  <text x="400" y="294" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#e65100">Information flows one way: DNA → RNA → Protein</text>
</svg>
