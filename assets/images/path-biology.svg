<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="bioBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8faf4"/>
      <stop offset="100%" style="stop-color:#d0f5e6"/>
    </linearGradient>
  </defs>
  
  <rect width="120" height="120" rx="16" fill="url(#bioBg)"/>
  
  <!-- Cell membrane -->
  <ellipse cx="60" cy="60" rx="42" ry="38" fill="none" stroke="url(#bioGrad)" stroke-width="4"/>
  
  <!-- Nucleus -->
  <ellipse cx="55" cy="55" rx="18" ry="16" fill="#38ef7d" opacity="0.4" stroke="#11998e" stroke-width="2"/>
  
  <!-- Nucleolus -->
  <circle cx="52" cy="52" r="6" fill="#11998e"/>
  
  <!-- Mitochondria -->
  <ellipse cx="82" cy="72" rx="12" ry="7" fill="#ff9a9e" stroke="#ff6b6b" stroke-width="1.5" transform="rotate(-30, 82, 72)"/>
  <path d="M74 70 Q82 68, 90 70" fill="none" stroke="#ff6b6b" stroke-width="1"/>
  <path d="M75 72 Q82 74, 89 72" fill="none" stroke="#ff6b6b" stroke-width="1"/>
  
  <!-- Ribosomes -->
  <circle cx="35" cy="75" r="3" fill="#667eea"/>
  <circle cx="42" cy="80" r="3" fill="#667eea"/>
  <circle cx="48" cy="76" r="3" fill="#667eea"/>
  <circle cx="70" cy="45" r="3" fill="#667eea"/>
  <circle cx="78" cy="50" r="3" fill="#667eea"/>
  
  <!-- ER lines -->
  <path d="M30 50 Q25 60, 30 70" fill="none" stroke="#11998e" stroke-width="2" opacity="0.6"/>
  <path d="M35 48 Q28 60, 35 72" fill="none" stroke="#11998e" stroke-width="2" opacity="0.6"/>
</svg>