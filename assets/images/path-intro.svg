<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="introGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="introBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#d0ebff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="120" height="120" rx="16" fill="url(#introBg)"/>
  
  <!-- DNA Double Helix Stylized -->
  <g transform="translate(25, 20)">
    <!-- Left strand -->
    <path d="M15 0 Q0 20, 15 40 Q30 60, 15 80" fill="none" stroke="url(#introGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M55 0 Q70 20, 55 40 Q40 60, 55 80" fill="none" stroke="url(#introGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Rungs -->
    <line x1="18" y1="10" x2="52" y2="10" stroke="#667eea" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="25" x2="62" y2="25" stroke="#764ba2" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="40" x2="52" y2="40" stroke="#667eea" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="55" x2="62" y2="55" stroke="#764ba2" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="70" x2="52" y2="70" stroke="#667eea" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Magnifying glass overlay -->
  <circle cx="85" cy="85" r="18" fill="none" stroke="#1f4f8f" stroke-width="4"/>
  <line x1="98" y1="98" x2="110" y2="110" stroke="#1f4f8f" stroke-width="5" stroke-linecap="round"/>
  <circle cx="85" cy="85" r="10" fill="#4facfe" opacity="0.3"/>
</svg>