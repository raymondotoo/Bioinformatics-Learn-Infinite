<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Multiple Testing and FDR Correction">
  <defs>
    <linearGradient id="naiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <linearGradient id="fdrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="800" height="380" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#333">The Multiple Testing Problem &amp; FDR Correction</text>
  
  <!-- Problem Statement -->
  <rect x="30" y="50" width="740" height="50" rx="8" fill="#FFF3E0"/>
  <text x="400" y="72" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#E65100">Problem: Testing 20,000 genes at p &lt; 0.05 yields ~1,000 false positives by chance!</text>
  <text x="400" y="90" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" fill="#BF360C">(20,000 × 0.05 = 1,000 expected false discoveries)</text>
  
  <!-- Left panel: Naive approach -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="115" width="350" height="240" rx="10" fill="#fff" stroke="#E53935" stroke-width="2"/>
  </g>
  <rect x="40" y="115" width="350" height="35" rx="10" fill="url(#naiveGrad)"/>
  <rect x="40" y="140" width="350" height="10" fill="url(#naiveGrad)"/>
  <text x="215" y="139" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" font-weight="bold" fill="#fff">❌ No Correction (p &lt; 0.05)</text>
  
  <!-- Naive bar chart -->
  <text x="60" y="175" font-family="Verdana, sans-serif" font-size="10" fill="#555">Genes called significant:</text>
  <rect x="60" y="185" width="280" height="30" rx="4" fill="#FFCDD2"/>
  <rect x="60" y="185" width="240" height="30" rx="4" fill="#EF5350"/>
  <text x="180" y="205" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">~1,050 genes</text>
  
  <!-- Naive breakdown -->
  <text x="60" y="235" font-family="Verdana, sans-serif" font-size="10" fill="#333">Breakdown:</text>
  <rect x="60" y="245" width="50" height="20" rx="3" fill="#4CAF50"/>
  <text x="120" y="260" font-family="Verdana, sans-serif" font-size="10" fill="#555">~50 true positives</text>
  <rect x="60" y="275" width="200" height="20" rx="3" fill="#F44336"/>
  <text x="270" y="290" font-family="Verdana, sans-serif" font-size="10" fill="#555">~1,000 false positives!</text>
  
  <text x="215" y="330" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" fill="#C62828">False Discovery Rate ≈ 95%</text>
  
  <!-- Right panel: FDR corrected -->
  <g filter="url(#cardShadow)">
    <rect x="410" y="115" width="350" height="240" rx="10" fill="#fff" stroke="#43A047" stroke-width="2"/>
  </g>
  <rect x="410" y="115" width="350" height="35" rx="10" fill="url(#fdrGrad)"/>
  <rect x="410" y="140" width="350" height="10" fill="url(#fdrGrad)"/>
  <text x="585" y="139" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" font-weight="bold" fill="#fff">✓ FDR Correction (q &lt; 0.05)</text>
  
  <!-- FDR bar chart -->
  <text x="430" y="175" font-family="Verdana, sans-serif" font-size="10" fill="#555">Genes called significant:</text>
  <rect x="430" y="185" width="56" height="30" rx="4" fill="#C8E6C9"/>
  <rect x="430" y="185" width="50" height="30" rx="4" fill="#66BB6A"/>
  <text x="456" y="205" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">~52</text>
  
  <!-- FDR breakdown -->
  <text x="430" y="235" font-family="Verdana, sans-serif" font-size="10" fill="#333">Breakdown:</text>
  <rect x="430" y="245" width="50" height="20" rx="3" fill="#4CAF50"/>
  <text x="490" y="260" font-family="Verdana, sans-serif" font-size="10" fill="#555">~50 true positives</text>
  <rect x="430" y="275" width="6" height="20" rx="3" fill="#FFC107"/>
  <text x="445" y="290" font-family="Verdana, sans-serif" font-size="10" fill="#555">~2-3 false positives (acceptable)</text>
  
  <text x="585" y="330" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" fill="#2E7D32">False Discovery Rate ≈ 5% ✓</text>
  
  <!-- Bottom note -->
  <rect x="150" y="362" width="500" height="14" rx="3" fill="#E8F5E9"/>
  <text x="400" y="373" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#1B5E20">Benjamini-Hochberg FDR is the gold standard for omics data</text>
</svg>
