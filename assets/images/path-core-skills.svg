<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="coreBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef0f5"/>
      <stop offset="100%" style="stop-color:#fde4ec"/>
    </linearGradient>
  </defs>
  
  <rect width="120" height="120" rx="16" fill="url(#coreBg)"/>
  
  <!-- Terminal window -->
  <rect x="15" y="20" width="90" height="65" rx="6" fill="#2d2d2d"/>
  <rect x="15" y="20" width="90" height="14" rx="6" fill="#3d3d3d"/>
  <rect x="15" y="28" width="90" height="57" fill="#2d2d2d"/>
  
  <!-- Window buttons -->
  <circle cx="25" cy="27" r="4" fill="#ff5f56"/>
  <circle cx="37" cy="27" r="4" fill="#ffbd2e"/>
  <circle cx="49" cy="27" r="4" fill="#27ca3f"/>
  
  <!-- Terminal text -->
  <text x="22" y="48" font-family="monospace" font-size="9" fill="#27ca3f">$ python</text>
  <text x="22" y="60" font-family="monospace" font-size="9" fill="#f5576c">&gt;&gt;&gt; import pandas</text>
  <text x="22" y="72" font-family="monospace" font-size="9" fill="#4facfe">&gt;&gt;&gt; df.head()</text>
  
  <!-- Git branch icon -->
  <g transform="translate(75, 88)">
    <circle cx="10" cy="10" r="4" fill="none" stroke="url(#coreGrad)" stroke-width="2"/>
    <circle cx="25" cy="5" r="4" fill="none" stroke="url(#coreGrad)" stroke-width="2"/>
    <circle cx="25" cy="20" r="4" fill="none" stroke="url(#coreGrad)" stroke-width="2"/>
    <path d="M14 10 L21 7" stroke="url(#coreGrad)" stroke-width="2"/>
    <path d="M14 10 L21 18" stroke="url(#coreGrad)" stroke-width="2"/>
  </g>
  
  <!-- Python logo hint -->
  <g transform="translate(20, 90)">
    <path d="M0 8 L8 0 L16 8" fill="none" stroke="#3776ab" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 16 L8 24 L16 16" fill="none" stroke="#ffd43b" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>