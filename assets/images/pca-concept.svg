<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="PCA Principal Component Analysis Concept">
  <defs>
    <linearGradient id="pcaAxisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#333">PCA: Reducing High-Dimensional Data</text>
  
  <!-- Left: High-dimensional data concept -->
  <text x="160" y="65" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" font-weight="bold" fill="#555">Before: 20,000 genes</text>
  
  <!-- Gene matrix representation -->
  <rect x="60" y="80" width="200" height="150" rx="6" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1"/>
  <text x="160" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#546E7A">Gene1  2.3  1.8  4.5  ...</text>
  <text x="160" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#546E7A">Gene2  0.5  0.6  1.2  ...</text>
  <text x="160" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#546E7A">Gene3  5.1  4.9  5.3  ...</text>
  <text x="160" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#78909C">  ⋮      ⋮     ⋮     ⋮</text>
  <text x="160" y="165" text-anchor="middle" font-family="monospace" font-size="9" fill="#78909C">Gene20000 ...</text>
  <text x="160" y="195" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#78909C">Samples →</text>
  <text x="55" y="155" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" fill="#78909C" transform="rotate(-90 55 155)">Genes ↓</text>
  
  <text x="160" y="250" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#F44336">Hard to visualize!</text>
  <text x="160" y="265" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" fill="#F44336">Can't plot 20,000 dimensions</text>
  
  <!-- Arrow -->
  <path d="M280 160 L350 160" stroke="#1976D2" stroke-width="3" fill="none"/>
  <polygon points="350,155 365,160 350,165" fill="#1976D2"/>
  <text x="323" y="145" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" font-weight="bold" fill="#1976D2">PCA</text>
  
  <!-- Right: PCA plot -->
  <text x="560" y="65" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" font-weight="bold" fill="#555">After: 2 Principal Components</text>
  
  <!-- PCA scatter plot area -->
  <rect x="380" y="80" width="360" height="250" rx="6" fill="#fff" stroke="#BDBDBD" stroke-width="1"/>
  
  <!-- Axes -->
  <line x1="420" y1="300" x2="720" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="420" y1="300" x2="420" y2="100" stroke="#333" stroke-width="2"/>
  <text x="570" y="325" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" fill="#333">PC1 (45% variance)</text>
  <text x="395" y="200" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" fill="#333" transform="rotate(-90 395 200)">PC2 (20% variance)</text>
  
  <!-- Cluster 1: Control (blue) -->
  <circle cx="480" cy="180" r="10" fill="#1976D2" opacity="0.8"/>
  <circle cx="500" cy="200" r="10" fill="#1976D2" opacity="0.8"/>
  <circle cx="470" cy="210" r="10" fill="#1976D2" opacity="0.8"/>
  <circle cx="510" cy="175" r="10" fill="#1976D2" opacity="0.8"/>
  <circle cx="490" cy="195" r="10" fill="#1976D2" opacity="0.8"/>
  <circle cx="485" cy="165" r="10" fill="#1976D2" opacity="0.8"/>
  
  <!-- Cluster 2: Treatment (orange) -->
  <circle cx="620" cy="240" r="10" fill="#FF7043" opacity="0.8"/>
  <circle cx="640" cy="220" r="10" fill="#FF7043" opacity="0.8"/>
  <circle cx="660" cy="250" r="10" fill="#FF7043" opacity="0.8"/>
  <circle cx="630" cy="260" r="10" fill="#FF7043" opacity="0.8"/>
  <circle cx="650" cy="235" r="10" fill="#FF7043" opacity="0.8"/>
  <circle cx="610" cy="255" r="10" fill="#FF7043" opacity="0.8"/>
  
  <!-- Outlier -->
  <circle cx="590" cy="130" r="10" fill="#9C27B0" opacity="0.8"/>
  <text x="610" y="125" font-family="Verdana, sans-serif" font-size="9" fill="#7B1FA2">Outlier?</text>
  
  <!-- Legend -->
  <circle cx="400" y="355" r="6" fill="#1976D2"/>
  <text x="415" y="359" font-family="Verdana, sans-serif" font-size="10" fill="#333">Control</text>
  <circle cx="490" y="355" r="6" fill="#FF7043"/>
  <text x="505" y="359" font-family="Verdana, sans-serif" font-size="10" fill="#333">Treatment</text>
  
  <!-- Key insights box -->
  <rect x="60" y="285" width="200" height="95" rx="6" fill="#E3F2FD"/>
  <text x="70" y="305" font-family="Verdana, sans-serif" font-size="10" font-weight="bold" fill="#1565C0">PCA Reveals:</text>
  <text x="70" y="322" font-family="Verdana, sans-serif" font-size="9" fill="#333">✓ Sample clusters</text>
  <text x="70" y="338" font-family="Verdana, sans-serif" font-size="9" fill="#333">✓ Batch effects</text>
  <text x="70" y="354" font-family="Verdana, sans-serif" font-size="9" fill="#333">✓ Outliers</text>
  <text x="70" y="370" font-family="Verdana, sans-serif" font-size="9" fill="#333">✓ Treatment separation</text>
</svg>
