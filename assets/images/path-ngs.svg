<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ngsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="ngsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f7"/>
      <stop offset="100%" style="stop-color:#fffbeb"/>
    </linearGradient>
  </defs>
  
  <rect width="120" height="120" rx="16" fill="url(#ngsBg)"/>
  
  <!-- Sequencing reads visualization -->
  <!-- Reference line -->
  <line x1="15" y1="35" x2="105" y2="35" stroke="#ddd" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Aligned reads -->
  <rect x="20" y="45" width="35" height="6" rx="2" fill="#4facfe"/>
  <rect x="30" y="53" width="40" height="6" rx="2" fill="#4facfe"/>
  <rect x="45" y="61" width="38" height="6" rx="2" fill="#4facfe"/>
  <rect x="55" y="69" width="42" height="6" rx="2" fill="#4facfe"/>
  <rect x="65" y="77" width="35" height="6" rx="2" fill="#4facfe"/>
  
  <!-- Variant markers -->
  <circle cx="50" cy="35" r="5" fill="#ff5f56"/>
  <circle cx="78" cy="35" r="5" fill="#27ca3f"/>
  
  <!-- Quality score bars -->
  <g transform="translate(15, 90)">
    <rect x="0" y="0" width="6" height="18" fill="#27ca3f" rx="1"/>
    <rect x="10" y="4" width="6" height="14" fill="#27ca3f" rx="1"/>
    <rect x="20" y="2" width="6" height="16" fill="#27ca3f" rx="1"/>
    <rect x="30" y="8" width="6" height="10" fill="#ffbd2e" rx="1"/>
    <rect x="40" y="0" width="6" height="18" fill="#27ca3f" rx="1"/>
    <rect x="50" y="3" width="6" height="15" fill="#27ca3f" rx="1"/>
    <rect x="60" y="12" width="6" height="6" fill="#ff5f56" rx="1"/>
    <rect x="70" y="1" width="6" height="17" fill="#27ca3f" rx="1"/>
    <rect x="80" y="5" width="6" height="13" fill="#27ca3f" rx="1"/>
  </g>
  
  <!-- FASTQ label -->
  <text x="88" y="25" font-family="monospace" font-size="10" font-weight="bold" fill="#fa709a">.fastq</text>
</svg>