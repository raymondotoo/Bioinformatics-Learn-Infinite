<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="scGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
    <linearGradient id="scBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5"/>
      <stop offset="100%" style="stop-color:#fffbf0"/>
    </linearGradient>
  </defs>
  
  <rect width="120" height="120" rx="16" fill="url(#scBg)"/>
  
  <!-- UMAP-style cluster visualization -->
  <!-- Cluster 1 - red/orange -->
  <circle cx="35" cy="40" r="6" fill="#ff6b6b"/>
  <circle cx="42" cy="35" r="5" fill="#ff6b6b"/>
  <circle cx="30" cy="48" r="5" fill="#ff8787"/>
  <circle cx="38" cy="50" r="4" fill="#ff6b6b"/>
  <circle cx="28" cy="38" r="4" fill="#ff8787"/>
  <circle cx="45" cy="45" r="5" fill="#ff6b6b"/>
  
  <!-- Cluster 2 - blue -->
  <circle cx="75" cy="35" r="6" fill="#4facfe"/>
  <circle cx="82" cy="42" r="5" fill="#4facfe"/>
  <circle cx="70" cy="28" r="5" fill="#74b9ff"/>
  <circle cx="85" cy="30" r="4" fill="#4facfe"/>
  <circle cx="78" cy="48" r="4" fill="#74b9ff"/>
  
  <!-- Cluster 3 - green -->
  <circle cx="55" cy="75" r="6" fill="#38ef7d"/>
  <circle cx="48" cy="82" r="5" fill="#38ef7d"/>
  <circle cx="62" cy="80" r="5" fill="#55efc4"/>
  <circle cx="52" cy="68" r="4" fill="#38ef7d"/>
  <circle cx="68" cy="72" r="4" fill="#55efc4"/>
  <circle cx="45" cy="72" r="5" fill="#38ef7d"/>
  
  <!-- Cluster 4 - purple -->
  <circle cx="90" cy="70" r="5" fill="#a18cd1"/>
  <circle cx="85" cy="78" r="5" fill="#a18cd1"/>
  <circle cx="95" cy="80" r="4" fill="#b8a4d8"/>
  <circle cx="82" cy="68" r="4" fill="#a18cd1"/>
  
  <!-- Spatial grid overlay hint -->
  <g stroke="#ddd" stroke-width="0.5" opacity="0.5">
    <line x1="20" y1="20" x2="20" y2="100"/>
    <line x1="40" y1="20" x2="40" y2="100"/>
    <line x1="60" y1="20" x2="60" y2="100"/>
    <line x1="80" y1="20" x2="80" y2="100"/>
    <line x1="100" y1="20" x2="100" y2="100"/>
    <line x1="20" y1="20" x2="100" y2="20"/>
    <line x1="20" y1="40" x2="100" y2="40"/>
    <line x1="20" y1="60" x2="100" y2="60"/>
    <line x1="20" y1="80" x2="100" y2="80"/>
    <line x1="20" y1="100" x2="100" y2="100"/>
  </g>
  
  <!-- Single cell icon -->
  <g transform="translate(8, 95)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="url(#scGrad)" stroke-width="2"/>
    <circle cx="8" cy="8" r="3" fill="#feca57"/>
  </g>
</svg>