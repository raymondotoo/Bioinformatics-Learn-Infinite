<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Common Bioinformatics File Formats">
  <defs>
    <filter id="formatShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="800" height="320" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#333">Common Bioinformatics File Formats</text>
  
  <!-- Row 1: Sequence files -->
  <g filter="url(#formatShadow)">
    <rect x="30" y="50" width="175" height="80" rx="8" fill="#E3F2FD"/>
    <rect x="30" y="50" width="175" height="24" rx="8" fill="#1976D2"/>
    <rect x="30" y="66" width="175" height="8" fill="#1976D2"/>
    <text x="117" y="68" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">FASTA</text>
    <text x="40" y="92" font-family="monospace" font-size="9" fill="#333">&gt;seq1</text>
    <text x="40" y="105" font-family="monospace" font-size="9" fill="#333">ATGCGATCGA...</text>
    <text x="40" y="122" font-family="Verdana, sans-serif" font-size="8" fill="#666">Sequence only</text>
  </g>
  
  <g filter="url(#formatShadow)">
    <rect x="220" y="50" width="175" height="80" rx="8" fill="#E3F2FD"/>
    <rect x="220" y="50" width="175" height="24" rx="8" fill="#1976D2"/>
    <rect x="220" y="66" width="175" height="8" fill="#1976D2"/>
    <text x="307" y="68" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">FASTQ</text>
    <text x="230" y="92" font-family="monospace" font-size="9" fill="#333">@read1</text>
    <text x="230" y="105" font-family="monospace" font-size="9" fill="#333">ATGC... + IIII...</text>
    <text x="230" y="122" font-family="Verdana, sans-serif" font-size="8" fill="#666">Seq + Quality scores</text>
  </g>
  
  <!-- Row 1: Alignment files -->
  <g filter="url(#formatShadow)">
    <rect x="410" y="50" width="175" height="80" rx="8" fill="#F3E5F5"/>
    <rect x="410" y="50" width="175" height="24" rx="8" fill="#7B1FA2"/>
    <rect x="410" y="66" width="175" height="8" fill="#7B1FA2"/>
    <text x="497" y="68" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">SAM/BAM/CRAM</text>
    <text x="420" y="92" font-family="monospace" font-size="8" fill="#333">read1 chr1 1000 60 ...</text>
    <text x="420" y="105" font-family="Verdana, sans-serif" font-size="9" fill="#333">Aligned reads</text>
    <text x="420" y="122" font-family="Verdana, sans-serif" font-size="8" fill="#666">BAM=compressed binary</text>
  </g>
  
  <g filter="url(#formatShadow)">
    <rect x="600" y="50" width="175" height="80" rx="8" fill="#E8F5E9"/>
    <rect x="600" y="50" width="175" height="24" rx="8" fill="#388E3C"/>
    <rect x="600" y="66" width="175" height="8" fill="#388E3C"/>
    <text x="687" y="68" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">VCF</text>
    <text x="610" y="92" font-family="monospace" font-size="8" fill="#333">chr1 12345 . A G ...</text>
    <text x="610" y="105" font-family="Verdana, sans-serif" font-size="9" fill="#333">Variants (SNPs, indels)</text>
    <text x="610" y="122" font-family="Verdana, sans-serif" font-size="8" fill="#666">Standard for variants</text>
  </g>
  
  <!-- Row 2: Annotation files -->
  <g filter="url(#formatShadow)">
    <rect x="30" y="145" width="175" height="80" rx="8" fill="#FFF3E0"/>
    <rect x="30" y="145" width="175" height="24" rx="8" fill="#EF6C00"/>
    <rect x="30" y="161" width="175" height="8" fill="#EF6C00"/>
    <text x="117" y="163" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">GTF/GFF</text>
    <text x="40" y="187" font-family="monospace" font-size="8" fill="#333">chr1 gene 1000 2000 ...</text>
    <text x="40" y="200" font-family="Verdana, sans-serif" font-size="9" fill="#333">Gene annotations</text>
    <text x="40" y="217" font-family="Verdana, sans-serif" font-size="8" fill="#666">Exons, transcripts</text>
  </g>
  
  <g filter="url(#formatShadow)">
    <rect x="220" y="145" width="175" height="80" rx="8" fill="#FFF3E0"/>
    <rect x="220" y="145" width="175" height="24" rx="8" fill="#EF6C00"/>
    <rect x="220" y="161" width="175" height="8" fill="#EF6C00"/>
    <text x="307" y="163" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">BED</text>
    <text x="230" y="187" font-family="monospace" font-size="8" fill="#333">chr1 1000 2000 name</text>
    <text x="230" y="200" font-family="Verdana, sans-serif" font-size="9" fill="#333">Genomic intervals</text>
    <text x="230" y="217" font-family="Verdana, sans-serif" font-size="8" fill="#666">Peaks, regions</text>
  </g>
  
  <!-- Row 2: Expression data -->
  <g filter="url(#formatShadow)">
    <rect x="410" y="145" width="175" height="80" rx="8" fill="#FCE4EC"/>
    <rect x="410" y="145" width="175" height="24" rx="8" fill="#C2185B"/>
    <rect x="410" y="161" width="175" height="8" fill="#C2185B"/>
    <text x="497" y="163" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">Count Matrix</text>
    <text x="420" y="187" font-family="monospace" font-size="8" fill="#333">Gene S1 S2 S3...</text>
    <text x="420" y="200" font-family="Verdana, sans-serif" font-size="9" fill="#333">Expression counts</text>
    <text x="420" y="217" font-family="Verdana, sans-serif" font-size="8" fill="#666">CSV/TSV, genes × samples</text>
  </g>
  
  <g filter="url(#formatShadow)">
    <rect x="600" y="145" width="175" height="80" rx="8" fill="#E0F7FA"/>
    <rect x="600" y="145" width="175" height="24" rx="8" fill="#00838F"/>
    <rect x="600" y="161" width="175" height="8" fill="#00838F"/>
    <text x="687" y="163" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">H5AD / Seurat</text>
    <text x="610" y="187" font-family="Verdana, sans-serif" font-size="9" fill="#333">Single-cell objects</text>
    <text x="610" y="200" font-family="Verdana, sans-serif" font-size="9" fill="#333">Counts + metadata</text>
    <text x="610" y="217" font-family="Verdana, sans-serif" font-size="8" fill="#666">AnnData, Seurat .rds</text>
  </g>
  
  <!-- Cheatsheet bar -->
  <rect x="30" y="245" width="745" height="60" rx="8" fill="#ECEFF1"/>
  <text x="60" y="268" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#37474F">Quick Reference:</text>
  
  <g font-family="Verdana, sans-serif" font-size="9" fill="#455A64">
    <text x="60" y="290">Raw reads → FASTQ</text>
    <text x="200" y="290">Alignment → BAM</text>
    <text x="340" y="290">Variants → VCF</text>
    <text x="480" y="290">Expression → Count matrix</text>
    <text x="640" y="290">Single-cell → H5AD/.rds</text>
  </g>
</svg>
