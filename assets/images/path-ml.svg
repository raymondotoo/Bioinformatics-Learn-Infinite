<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="mlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0093E9"/>
      <stop offset="100%" style="stop-color:#80D0C7"/>
    </linearGradient>
    <linearGradient id="mlBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f4fc"/>
      <stop offset="100%" style="stop-color:#e0f5f1"/>
    </linearGradient>
  </defs>
  
  <rect width="120" height="120" rx="16" fill="url(#mlBg)"/>
  
  <!-- Neural Network -->
  <!-- Input layer -->
  <circle cx="25" cy="30" r="8" fill="url(#mlGrad)"/>
  <circle cx="25" cy="55" r="8" fill="url(#mlGrad)"/>
  <circle cx="25" cy="80" r="8" fill="url(#mlGrad)"/>
  
  <!-- Hidden layer 1 -->
  <circle cx="55" cy="25" r="7" fill="#80D0C7"/>
  <circle cx="55" cy="48" r="7" fill="#80D0C7"/>
  <circle cx="55" cy="71" r="7" fill="#80D0C7"/>
  <circle cx="55" cy="94" r="7" fill="#80D0C7"/>
  
  <!-- Hidden layer 2 -->
  <circle cx="85" cy="35" r="7" fill="#0093E9"/>
  <circle cx="85" cy="60" r="7" fill="#0093E9"/>
  <circle cx="85" cy="85" r="7" fill="#0093E9"/>
  
  <!-- Output -->
  <circle cx="108" cy="60" r="9" fill="url(#mlGrad)" stroke="#fff" stroke-width="2"/>
  
  <!-- Connections - simplified -->
  <g stroke="#0093E9" stroke-width="1" opacity="0.4">
    <!-- Input to hidden 1 -->
    <line x1="33" y1="30" x2="48" y2="25"/>
    <line x1="33" y1="30" x2="48" y2="48"/>
    <line x1="33" y1="55" x2="48" y2="48"/>
    <line x1="33" y1="55" x2="48" y2="71"/>
    <line x1="33" y1="80" x2="48" y2="71"/>
    <line x1="33" y1="80" x2="48" y2="94"/>
    
    <!-- Hidden 1 to hidden 2 -->
    <line x1="62" y1="25" x2="78" y2="35"/>
    <line x1="62" y1="48" x2="78" y2="35"/>
    <line x1="62" y1="48" x2="78" y2="60"/>
    <line x1="62" y1="71" x2="78" y2="60"/>
    <line x1="62" y1="71" x2="78" y2="85"/>
    <line x1="62" y1="94" x2="78" y2="85"/>
    
    <!-- Hidden 2 to output -->
    <line x1="92" y1="35" x2="99" y2="60"/>
    <line x1="92" y1="60" x2="99" y2="60"/>
    <line x1="92" y1="85" x2="99" y2="60"/>
  </g>
  
  <!-- AI sparkle -->
  <g fill="#0093E9">
    <polygon points="108,45 110,50 115,50 111,53 112,58 108,55 104,58 105,53 101,50 106,50" opacity="0.6"/>
  </g>
</svg>