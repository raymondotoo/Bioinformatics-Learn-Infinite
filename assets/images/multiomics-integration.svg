<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Multi-omics Integration Strategies">
  <defs>
    <linearGradient id="genomicsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="transcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#BA68C8"/>
    </linearGradient>
    <linearGradient id="proteomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="metabolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <filter id="omicsShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#333">Multi-Omics Integration Strategies</text>
  
  <!-- Omics layers on left -->
  <g filter="url(#omicsShadow)">
    <rect x="30" y="55" width="120" height="35" rx="6" fill="url(#genomicsGrad)"/>
    <text x="90" y="78" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">Genomics</text>
  </g>
  <g filter="url(#omicsShadow)">
    <rect x="30" y="100" width="120" height="35" rx="6" fill="url(#transcGrad)"/>
    <text x="90" y="123" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">Transcriptomics</text>
  </g>
  <g filter="url(#omicsShadow)">
    <rect x="30" y="145" width="120" height="35" rx="6" fill="url(#proteomGrad)"/>
    <text x="90" y="168" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">Proteomics</text>
  </g>
  <g filter="url(#omicsShadow)">
    <rect x="30" y="190" width="120" height="35" rx="6" fill="url(#metabolGrad)"/>
    <text x="90" y="213" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#fff">Metabolomics</text>
  </g>
  
  <!-- Strategy 1: Early Integration -->
  <rect x="180" y="50" width="185" height="185" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="272" y="72" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" font-weight="bold" fill="#0D47A1">Early Integration</text>
  <text x="272" y="88" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#555">(Feature-level)</text>
  
  <!-- Arrows to early -->
  <path d="M155 72 L180 110" stroke="#1565C0" stroke-width="1.5" fill="none"/>
  <path d="M155 117 L180 115" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>
  <path d="M155 162 L180 120" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  <path d="M155 207 L180 125" stroke="#E65100" stroke-width="1.5" fill="none"/>
  
  <!-- Concatenated matrix -->
  <rect x="200" y="100" width="145" height="80" rx="4" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <rect x="200" y="100" width="145" height="18" fill="#BBDEFB"/>
  <rect x="200" y="118" width="145" height="18" fill="#E1BEE7"/>
  <rect x="200" y="136" width="145" height="18" fill="#C8E6C9"/>
  <rect x="200" y="154" width="145" height="26" fill="#FFE0B2"/>
  <text x="272" y="115" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">Genomic features</text>
  <text x="272" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">RNA features</text>
  <text x="272" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">Protein features</text>
  <text x="272" y="170" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">Metabolite features</text>
  
  <text x="272" y="200" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#1565C0">→ One big matrix</text>
  <text x="272" y="215" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#1565C0">→ Single model</text>
  
  <!-- Strategy 2: Intermediate Integration -->
  <rect x="380" y="50" width="185" height="185" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="472" y="72" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" font-weight="bold" fill="#4A148C">Intermediate</text>
  <text x="472" y="88" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#555">(Latent-level)</text>
  
  <!-- Latent factors -->
  <rect x="400" y="105" width="40" height="60" rx="3" fill="#BBDEFB"/>
  <rect x="445" y="105" width="40" height="60" rx="3" fill="#E1BEE7"/>
  <rect x="490" y="105" width="40" height="60" rx="3" fill="#C8E6C9"/>
  <text x="420" y="140" text-anchor="middle" font-family="Verdana, sans-serif" font-size="7" fill="#333">LF1</text>
  <text x="465" y="140" text-anchor="middle" font-family="Verdana, sans-serif" font-size="7" fill="#333">LF2</text>
  <text x="510" y="140" text-anchor="middle" font-family="Verdana, sans-serif" font-size="7" fill="#333">LF3</text>
  
  <path d="M420 170 L450 185 L480 185 L510 170" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>
  <ellipse cx="472" cy="195" rx="40" ry="15" fill="#CE93D8"/>
  <text x="472" y="200" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" font-weight="bold" fill="#fff">Combined</text>
  
  <text x="472" y="222" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" fill="#7B1FA2">MOFA+, DIABLO</text>
  
  <!-- Strategy 3: Late Integration -->
  <rect x="580" y="50" width="185" height="185" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="672" y="72" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" font-weight="bold" fill="#1B5E20">Late Integration</text>
  <text x="672" y="88" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#555">(Decision-level)</text>
  
  <!-- Separate models -->
  <rect x="600" y="100" width="50" height="30" rx="4" fill="#BBDEFB"/>
  <text x="625" y="120" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" fill="#333">M1</text>
  <rect x="655" y="100" width="50" height="30" rx="4" fill="#E1BEE7"/>
  <text x="680" y="120" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" fill="#333">M2</text>
  <rect x="710" y="100" width="50" height="30" rx="4" fill="#C8E6C9"/>
  <text x="735" y="120" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" fill="#333">M3</text>
  
  <text x="625" y="145" text-anchor="middle" font-family="Verdana, sans-serif" font-size="7" fill="#666">pred1</text>
  <text x="680" y="145" text-anchor="middle" font-family="Verdana, sans-serif" font-size="7" fill="#666">pred2</text>
  <text x="735" y="145" text-anchor="middle" font-family="Verdana, sans-serif" font-size="7" fill="#666">pred3</text>
  
  <path d="M625 150 L672 175" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  <path d="M680 150 L672 175" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  <path d="M735 150 L672 175" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  
  <ellipse cx="672" cy="190" rx="45" ry="18" fill="#81C784"/>
  <text x="672" y="195" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" font-weight="bold" fill="#fff">Ensemble</text>
  
  <text x="672" y="222" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" fill="#2E7D32">Voting, Stacking</text>
  
  <!-- Comparison table -->
  <rect x="30" y="250" width="740" height="135" rx="8" fill="#fff" stroke="#BDBDBD" stroke-width="1"/>
  <rect x="30" y="250" width="740" height="28" rx="8" fill="#ECEFF1"/>
  <rect x="30" y="270" width="740" height="8" fill="#ECEFF1"/>
  
  <text x="120" y="270" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#333">Strategy</text>
  <text x="300" y="270" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#333">Best When</text>
  <text x="520" y="270" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#333">Pros</text>
  <text x="690" y="270" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#333">Cons</text>
  
  <!-- Row 1: Early -->
  <line x1="30" y1="305" x2="770" y2="305" stroke="#E0E0E0" stroke-width="1"/>
  <text x="120" y="298" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" font-weight="bold" fill="#1976D2">Early</text>
  <text x="300" y="298" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">Large n, harmonized features</text>
  <text x="520" y="298" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">Simple, detects cross-layer patterns</text>
  <text x="690" y="298" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">High dim, overfitting risk</text>
  
  <!-- Row 2: Intermediate -->
  <line x1="30" y1="335" x2="770" y2="335" stroke="#E0E0E0" stroke-width="1"/>
  <text x="120" y="328" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2">Intermediate</text>
  <text x="300" y="328" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">Different feature spaces</text>
  <text x="520" y="328" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">Shared vs unique variance</text>
  <text x="690" y="328" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">Method complexity</text>
  
  <!-- Row 3: Late -->
  <text x="120" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">Late</text>
  <text x="300" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">Missing samples per layer</text>
  <text x="520" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">Flexible, interpretable per layer</text>
  <text x="690" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9" fill="#333">May miss cross-layer signal</text>
</svg>
