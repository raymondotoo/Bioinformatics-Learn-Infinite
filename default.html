<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="container">
    <aside class="sidebar">
      <h2>Table of Contents</h2>
      <ul>
        {% for link in page.toc %}
          <li><a href="{{ link.url }}">{{ link.title }}</a></li>
        {% endfor %}
      </ul>
    </aside>

    <main class="content">
      {{ content }}
    </main>
  </div>

</body>
</html>
