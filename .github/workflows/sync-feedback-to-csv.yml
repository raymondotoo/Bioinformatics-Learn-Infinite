name: Sync Feedback to CSV

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled, closed]
  workflow_dispatch:
  schedule:
    - cron: '25 */6 * * *'

permissions:
  contents: write
  issues: read

jobs:
  sync-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build feedback CSV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/sync_feedback_to_csv.py

      - name: Commit updated CSV
        run: |
          if git diff --quiet -- data/feedback.csv; then
            echo "No feedback CSV changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feedback.csv
          git commit -m "Sync feedback CSV"
          git push
