name: Sync Feedback to CSV

on:
  push:
    paths:
      - '_data/feedback/**'
      - 'scripts/sync_feedback_to_csv.py'
      - '.github/workflows/sync-feedback-to-csv.yml'
  workflow_dispatch:
  schedule:
    - cron: '25 */6 * * *'

permissions:
  contents: write

jobs:
  sync-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build feedback CSV
        run: python scripts/sync_feedback_to_csv.py

      - name: Commit updated CSV
        run: |
          if git diff --quiet -- data/feedback.csv; then
            echo "No feedback CSV changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feedback.csv
          git commit -m "Sync feedback CSV"
          git push
